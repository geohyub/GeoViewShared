<!-- GeoView QC — Chart Panel Component
     Chart.js wrapper with GeoView dark theme defaults.

     Usage: {{ chart_panel("my-chart", "Score Distribution", height=300) }}
     Then in JS: const ctx = document.getElementById('my-chart');
-->

{% macro chart_panel(canvas_id, title="", height=280, full_width=false) %}
<div class="card {% if full_width %}w-100{% endif %}" style="background: var(--gv-navy); border: 1px solid var(--gv-border);">
    {% if title %}
    <div class="card-header py-2 px-3" style="border-bottom: 1px solid var(--gv-border);">
        <span style="font-weight: 600; font-size: 0.82rem; color: var(--gv-text);">
            <i class="bi bi-bar-chart" style="color: var(--gv-blue);"></i> {{ title }}
        </span>
    </div>
    {% endif %}
    <div class="card-body p-2">
        <canvas id="{{ canvas_id }}" height="{{ height }}"></canvas>
    </div>
</div>
{% endmacro %}


<!-- Pre-built chart creation helpers (call from JS) -->
{% macro chart_scripts() %}
<script>
/* GeoView QC Chart Factory */
const GV_COLORS = {
    cyan: '#06b6d4', blue: '#3b82f6', green: '#10b981',
    orange: '#f59e0b', red: '#ef4444', purple: '#8b5cf6',
    navy: '#1e293b', muted: '#64748b', text: '#e2e8f0',
};
const GV_PALETTE = [GV_COLORS.blue, GV_COLORS.green, GV_COLORS.red, GV_COLORS.orange, GV_COLORS.purple];

function createScoreDonut(canvasId, score, grade) {
    const gradeColors = {A:'#38A169', B:'#3182CE', C:'#ED8936', D:'#E53E3E', F:'#718096'};
    const color = gradeColors[grade] || gradeColors.F;
    return new Chart(document.getElementById(canvasId), {
        type: 'doughnut',
        data: {
            labels: ['Score', 'Remaining'],
            datasets: [{
                data: [score, 100 - score],
                backgroundColor: [color, 'rgba(255,255,255,0.04)'],
                borderWidth: 0, borderRadius: 4,
            }],
        },
        options: {
            cutout: '75%', responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false },
            },
        },
        plugins: [{
            id: 'centerText',
            afterDraw(chart) {
                const {ctx, chartArea: {width, height, top}} = chart;
                ctx.save();
                ctx.font = `bold ${width*0.22}px Pretendard, sans-serif`;
                ctx.fillStyle = color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.round(score), width/2, top + height/2 - 6);
                ctx.font = `${width*0.08}px Pretendard, sans-serif`;
                ctx.fillStyle = GV_COLORS.muted;
                ctx.fillText('/ 100', width/2, top + height/2 + width*0.14);
                ctx.restore();
            }
        }],
    });
}

function createBarChart(canvasId, labels, values, colors) {
    colors = colors || labels.map((_, i) => GV_PALETTE[i % GV_PALETTE.length]);
    return new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: values, backgroundColor: colors,
                borderWidth: 0, borderRadius: 4, barPercentage: 0.7,
            }],
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            indexAxis: 'y',
            scales: {
                x: { max: 100, grid: { color: 'rgba(255,255,255,0.04)' } },
                y: { grid: { display: false } },
            },
            plugins: { legend: { display: false } },
        },
    });
}

function createLineChart(canvasId, labels, datasets) {
    return new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: { labels, datasets: datasets.map((ds, i) => ({
            label: ds.label || `Series ${i+1}`,
            data: ds.data,
            borderColor: ds.color || GV_PALETTE[i % GV_PALETTE.length],
            backgroundColor: (ds.color || GV_PALETTE[i % GV_PALETTE.length]) + '20',
            fill: ds.fill || false,
            tension: 0.3, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
        }))},
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.04)' } },
                y: { grid: { color: 'rgba(255,255,255,0.04)' } },
            },
        },
    });
}
</script>
{% endmacro %}
